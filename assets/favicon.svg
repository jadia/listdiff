<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Two overlapping list panels -->
  <rect x="2" y="3" width="18" height="26" rx="3" fill="#3B82F6" opacity="0.3"/>
  <rect x="12" y="3" width="18" height="26" rx="3" fill="#3B82F6" opacity="0.2"/>
  <!-- Lines representing list items -->
  <line x1="6" y1="10" x2="15" y2="10" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  <line x1="6" y1="16" x2="13" y2="16" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  <line x1="6" y1="22" x2="11" y2="22" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  <line x1="17" y1="10" x2="26" y2="10" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  <line x1="19" y1="16" x2="26" y2="16" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  <line x1="21" y1="22" x2="26" y2="22" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
</svg>
